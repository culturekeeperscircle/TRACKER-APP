name: Deep Sweep Tracker Update

# Opt-in backlog drain. Daily cron uses manual-update.yml / daily-update.yml
# with the default 15-entry cap; this workflow raises the caps so a single
# run can drain a multi-week backlog. Trigger manually after billing hiccups,
# state resets, or whenever a deep catch-up pass is needed.

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to fetch from'
        required: true
        type: choice
        default: all
        options:
          - all
          - federal_register
          - congress
          - courtlistener
          - news
      lookback_days:
        description: 'Days to look back (0 = since last successful run)'
        required: true
        default: '17'
      max_entries:
        description: 'Cap on entries generated per run'
        required: true
        default: '100'
      max_screening:
        description: 'Cap on items sent to Claude screening'
        required: true
        default: '500'
      dry_run:
        description: 'Dry run (no commit)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  deep-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Run pipeline (deep-sweep caps)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days }}
          SOURCE_FILTER: ${{ github.event.inputs.source }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          MAX_ENTRIES_PER_RUN: ${{ github.event.inputs.max_entries }}
          MAX_SCREENING_ITEMS: ${{ github.event.inputs.max_screening }}
          SCREENING_TIME_BUDGET: '3600'
        run: python -m pipeline

      - name: Commit if not dry run
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "TCKC Pipeline Bot"
          git config user.email "pipeline@culturekeeperscircle.org"
          git add data/data.json data/state.json index.html
          ENTRY_COUNT=$(python -c "import json; print(json.load(open('data/state.json')).get('last_run_new_entries', 0))")
          git diff --staged --quiet || git commit -m "Deep sweep (${{ github.event.inputs.source }}): ${ENTRY_COUNT} new entries [$(date +%Y-%m-%d)]"
          git push

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-sweep-log-${{ github.run_id }}
          path: pipeline/logs/
          retention-days: 30
